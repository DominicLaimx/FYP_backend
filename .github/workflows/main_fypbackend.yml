name: Build and deploy Python app to Azure Web App - fypbackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (for any packages needing compilers)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ openjdk-17-jdk

      - name: Create and activate virtual environment
        run: |
          python -m venv antenv
          source antenv/bin/activate

      - name: Install Python dependencies
        run: |
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          # If you have mediapipe or other complex packages
          pip install mediapipe==0.10.11 --no-cache-dir --prefer-binary

      - name: Create Oryx manifest
        run: |
          echo '[python]
          version = "3.11"
          enable_oryx_build = false
          
          [build]
          startup_command = "gunicorn app:app --access-logfile - --error-logfile -"' > oryx-manifest.toml

      - name: Zip artifact (INCLUDE the virtual environment)
        run: zip -r release.zip . -x "*.git*" "*.github*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fypbackend'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B54C93F982B54A7A98AB528AC47D345C }}